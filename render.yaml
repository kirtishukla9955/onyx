databases:
  - name: onyx-db
    plan: free
    databaseName: onyx
    user: onyx_user

services:
  - type: web
    name: onyx-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: onyx-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      # S3 Configuration must be provided manually in the Render Dashboard
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false

  - type: web
    name: onyx-frontend
    env: static
    plan: free
    buildCommand: "cd onyx-frontend && npm install && npm run build"
    staticPublishPath: "./onyx-frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: onyx-backend
          property: host
