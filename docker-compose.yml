version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: onyx-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onyx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onyx"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-06-06T09-36-42Z
    container_name: onyx-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2024-06-05T15-56-11Z
    container_name: onyx-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      if /usr/bin/mc ls myminio/onyx-assets > /dev/null 2>&1; then
        echo 'Bucket onyx-assets already exists';
      else
        /usr/bin/mc mb myminio/onyx-assets;
        /usr/bin/mc anonymous set download myminio/onyx-assets;
        echo 'Bucket onyx-assets created successfully';
      fi;
      exit 0;
      "

  app:
    build: .
    container_name: onyx-fastapi-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/onyx
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=onyx-assets
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
